    <style>
        .cell10::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 45%;
            background: #7D3FE7;
            border-radius: 0 0 8px 8px;

        .header_text {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            gap: 24px;
        }

        .vidi-sve {
            color: #FFFFFF;
            font-family: 'Inter', sans-serif;
            font-size: 18px;
            font-weight: 600;
            text-decoration: underline;
            transition: opacity 0.2s;
        }

        .vidi-sve:hover {
            opacity: 0.75;
        }

        .gallery-container {
            padding: 0 6% 100px;
            max-width: calc(1200px + 10.3174603175% * 2);
            margin: 0 auto;
            min-height: 100vh;
            background-color: #1A1930;
        }

        .masonry {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            grid-auto-flow: dense;
        }

        /* Key fix: items are positioned containers with aspect-ratio.
           Images fill them absolutely — no more JS row-span math needed. */
        .masonry-item {
            position: relative;
            border-radius: 10px;
            overflow: hidden;
            cursor: pointer;
            aspect-ratio: 4 / 3;  /* default cell shape */
        }

        .masonry-item.span-2 { grid-column: span 2; }
        .masonry-item.span-3 { grid-column: span 3; aspect-ratio: 16 / 6; }
        .masonry-item.tall   { grid-row: span 2;    aspect-ratio: 3 / 4; }
        /* span-2 + tall: 2 cols wide, 2 rows tall — aspect ratio matches 2 normal cells */
        .masonry-item.span-2.tall { aspect-ratio: 8 / 6; }

        .masonry-item img {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s ease;
        }

        .masonry-item:hover img {
            transform: scale(1.03);
        }

        .masonry-item .overlay {
            position: absolute;
            inset: 0;
            background: rgba(125, 63, 231, 0.35);
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: 1;
        }

        .masonry-item:hover .overlay {
            opacity: 1;
        }

        /* LIGHTBOX */
        .lightbox {
            font-family: 'Inter', sans-serif;
            position: fixed;
            inset: 0;
            background: rgba(10, 9, 30, 0.95);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .lightbox.open { opacity: 1; pointer-events: all; }

        .lightbox-img {
            max-width: 80vw;
            max-height: 88vh;
            border-radius: 10px;
            object-fit: contain;
            transform: scale(0.95);
            transition: transform 0.3s ease;
        }

        .lightbox.open .lightbox-img { transform: scale(1); }

        .lightbox-close {
            position: absolute;
            top: 24px; right: 24px;
            background: none;
            border: none;
            color: #F5F3F3;
            font-size: 32px;
            cursor: pointer;
            line-height: 1;
            transition: color 0.2s, transform 0.2s;
        }

        .lightbox-close:hover { color: #C2E64A; transform: rotate(90deg); }

        .lightbox-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255,255,255,0.08);
            border: none;
            color: #F5F3F3;
            font-size: 24px;
            width: 52px;
            height: 52px;
            border-radius: 50%;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .lightbox-arrow:hover { background: rgba(194, 230, 74, 0.2); color: #C2E64A; }
        .lightbox-prev { left: 24px; }
        .lightbox-next { right: 24px; }

        .lightbox-counter {
            position: absolute;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            color: #AFACBF;
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 1px;
        }

        .bottom_text {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 100px;
        }

        @media (max-width: 950px) {
            .masonry {
                display: flex;
                flex-direction: column;
            }

            .masonry-item,
            .masonry-item.span-2,
            .masonry-item.span-2.tall,
            .masonry-item.span-3,
            .masonry-item.tall {
                grid-column: unset;
                grid-row: unset;
                aspect-ratio: 4 / 3;
                width: 100%;
            }

            .gallery-container {
                padding: 0 18px 100px;
            }

            .lightbox-arrow {
                display: none;
            }

            .lightbox-img {
                max-width: calc(100vw - 18px);
            }
        }

    <script>
        const items = document.querySelectorAll(".masonry-item")
        const lightbox = document.getElementById("lightbox")
        const lightboxImg = document.getElementById("lightboxImg")
        const lightboxClose = document.getElementById("lightboxClose")
        const lightboxPrev = document.getElementById("lightboxPrev")
        const lightboxNext = document.getElementById("lightboxNext")
        const lightboxCounter = document.getElementById("lightboxCounter")

        let current = 0
        const images = Array.from(items).map(item => {
            const img = item.querySelector("img")
            return img.dataset.full || img.src
        })

        function openLightbox(index) {
            current = index
            lightboxImg.src = images[current]
            lightboxCounter.textContent = `${current + 1} / ${images.length}`
            lightbox.classList.add("open")
            document.body.style.overflow = "hidden"
        }

        function closeLightbox() {
            lightbox.classList.remove("open")
            document.body.style.overflow = ""
        }

        function prevImage() {
            current = (current - 1 + images.length) % images.length
            lightboxImg.src = images[current]
            lightboxCounter.textContent = `${current + 1} / ${images.length}`
        }

        function nextImage() {
            current = (current + 1) % images.length
            lightboxImg.src = images[current]
            lightboxCounter.textContent = `${current + 1} / ${images.length}`
        }

        items.forEach((item, i) => item.addEventListener("click", () => openLightbox(i)))
        lightboxClose.addEventListener("click", closeLightbox)
        lightboxPrev.addEventListener("click", prevImage)
        lightboxNext.addEventListener("click", nextImage)
        lightbox.addEventListener("click", (e) => { if (e.target === lightbox) closeLightbox() })

        document.addEventListener("keydown", (e) => {
            if (!lightbox.classList.contains("open")) return
            if (e.key === "Escape") closeLightbox()
            if (e.key === "ArrowLeft") prevImage()
            if (e.key === "ArrowRight") nextImage()
        })

        let touchStartX = 0
        lightbox.addEventListener("touchstart", (e) => { touchStartX = e.changedTouches[0].screenX }, { passive: true })
        lightbox.addEventListener("touchend", (e) => {
            const diff = touchStartX - e.changedTouches[0].screenX
            if (Math.abs(diff) > 50) { if (diff > 0) nextImage(); else prevImage() }
        }, { passive: true })
    </script>
